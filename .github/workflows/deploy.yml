name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        run: git clone "https://github-actions:${{ github.token }}@github.com/${{ github.repository }}.git" repo

      - name: Install Node.js 24
        run: |
          curl -fsSL https://deb.nodesource.com/setup_24.x | sudo -E bash -
          sudo apt-get install -y nodejs
          node --version

      - name: Install dependencies and build
        working-directory: repo
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
        run: npm install && npm run build

      - name: Deploy dist to gh-pages branch
        run: |
          cp -r repo/dist /tmp/dist
          cd /tmp/dist
          git init
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Deploy to GitHub Pages"
          git push --force "https://github-actions:${{ github.token }}@github.com/${{ github.repository }}.git" HEAD:gh-pages